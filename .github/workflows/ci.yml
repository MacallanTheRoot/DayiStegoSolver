name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and development checks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify runtime version
        run: |
          python -c "import dayi; print(dayi.__version__)"
          python -m dayi.cli --version

      - name: Run tests
        run: python -m pytest -q

      - name: Run static checks
        run: |
          python -m pyflakes dayi tests scripts/validate_distribution.py
          python -m compileall -q dayi tests scripts/validate_distribution.py
          git diff --check

  package:
    name: Build and smoke test
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build>=1.2.1"

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate distribution archives
        run: python scripts/validate_distribution.py --dist-dir dist

      - name: Smoke-test wheel in a clean environment
        shell: bash
        run: |
          set -euo pipefail
          wheel_path=$(python -c 'from pathlib import Path; print(next(Path("dist").glob("*.whl")).resolve())')
          wheel_venv="${RUNNER_TEMP}/dayi-wheel-smoke"
          smoke_dir=$(mktemp -d "${RUNNER_TEMP}/dayi-wheel-cwd.XXXXXX")
          python -m venv "$wheel_venv"
          "$wheel_venv/bin/python" -m pip install --no-deps "$wheel_path"

          cd "$smoke_dir"
          "$wheel_venv/bin/dayi" --version
          "$wheel_venv/bin/dayi" --help >/dev/null
          "$wheel_venv/bin/dayi" scan --help >/dev/null
          "$wheel_venv/bin/dayi" doctor --help >/dev/null
          "$wheel_venv/bin/dayi" plugins --help >/dev/null
          "$wheel_venv/bin/dayi" plugins list --help >/dev/null
          "$wheel_venv/bin/dayi" doctor --json > "${RUNNER_TEMP}/doctor.json"
          "$wheel_venv/bin/dayi" plugins list --json > "${RUNNER_TEMP}/plugins.json"
          "$wheel_venv/bin/python" -m json.tool "${RUNNER_TEMP}/doctor.json" >/dev/null
          "$wheel_venv/bin/python" -m json.tool "${RUNNER_TEMP}/plugins.json" >/dev/null

          "$wheel_venv/bin/python" - "${RUNNER_TEMP}/doctor.json" "${RUNNER_TEMP}/plugins.json" <<'PY'
          import json
          import os
          import sys
          from importlib import metadata
          from pathlib import Path

          import dayi

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          package_path = Path(dayi.__file__).resolve()
          if package_path == workspace or workspace in package_path.parents:
              raise SystemExit(f"dayi imported from checkout: {package_path}")
          if dayi.__version__ != "4.0.0":
              raise SystemExit(f"unexpected runtime version: {dayi.__version__}")

          distribution = metadata.distribution("dayi-stego-solver")
          console_scripts = {
              entry.name: entry.value
              for entry in distribution.entry_points
              if entry.group == "console_scripts"
          }
          if console_scripts.get("dayi") != "dayi.cli:main":
              raise SystemExit(f"unexpected entry point: {console_scripts!r}")

          package_metadata = distribution.metadata
          expected = {
              "Name": "dayi-stego-solver",
              "Version": "4.0.0",
              "Author": "MacallanTheRoot",
              "Requires-Python": ">=3.10",
          }
          for field, value in expected.items():
              if package_metadata.get(field) != value:
                  raise SystemExit(
                      f"unexpected metadata {field}: {package_metadata.get(field)!r}"
                  )
          if "Development Status :: 4 - Beta" not in package_metadata.get_all(
              "Classifier", []
          ):
              raise SystemExit("Beta classifier missing from installed metadata")
          if package_metadata.get("License-Expression") != "MIT":
              raise SystemExit("MIT license expression missing from installed metadata")
          urls = {}
          for value in package_metadata.get_all("Project-URL", []):
              label, _, url = value.partition(",")
              urls[label.strip()] = url.strip()
          expected_urls = {
              "Repository": "https://github.com/MacallanTheRoot/DayiStegoSolver",
              "Bug Tracker": "https://github.com/MacallanTheRoot/DayiStegoSolver/issues",
          }
          if urls != expected_urls:
              raise SystemExit(f"unexpected project URLs: {urls!r}")

          doctor = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if doctor.get("schema_version") != 1:
              raise SystemExit("unexpected doctor schema version")
          if doctor.get("core_usable") is not True:
              raise SystemExit("doctor reports an unusable core")
          if doctor.get("overall_status") not in {"healthy", "degraded"}:
              raise SystemExit("doctor reports an unexpected status")

          plugins = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          entries = plugins.get("plugins", [])
          if plugins.get("schema_version") != 1 or not entries:
              raise SystemExit("plugin listing is empty or has an unexpected schema")
          if plugins.get("plugin_count") != len(entries):
              raise SystemExit("plugin_count does not match plugins")
          if plugins.get("issue_count") != len(plugins.get("issues", [])):
              raise SystemExit("issue_count does not match issues")
          ids = [entry.get("plugin_id") for entry in entries]
          if len(ids) != len(set(ids)):
              raise SystemExit("plugin IDs are not unique")
          required_fields = {
              "plugin_id",
              "phase",
              "priority",
              "requires_wordlist",
              "requires_mini_wordlist",
              "contributes_to_mini_wordlist",
              "skip_if_phase_succeeded",
              "skip_if_plugins_succeeded",
              "has_custom_success_evaluator",
              "module",
              "availability",
          }
          if any(not required_fields.issubset(entry) for entry in entries):
              raise SystemExit("plugin listing is missing required fields")
          phase_order = {
              "CONCURRENT": 10,
              "ARCHIVE": 20,
              "MINI_BRUTE_FORCE": 30,
              "MAIN_PRIMARY": 40,
              "MAIN_FALLBACK": 50,
              "MAIN_FINAL": 60,
          }
          expected_order = sorted(
              entries,
              key=lambda entry: (
                  phase_order[entry["phase"]],
                  entry["priority"],
                  entry["plugin_id"],
              ),
          )
          if entries != expected_order:
              raise SystemExit("plugin listing order is not deterministic")
          print(package_path)
          PY

      - name: Smoke-test source distribution in a clean environment
        shell: bash
        run: |
          set -euo pipefail
          sdist_path=$(python -c 'from pathlib import Path; print(next(Path("dist").glob("*.tar.gz")).resolve())')
          sdist_venv="${RUNNER_TEMP}/dayi-sdist-smoke"
          smoke_dir=$(mktemp -d "${RUNNER_TEMP}/dayi-sdist-cwd.XXXXXX")
          python -m venv "$sdist_venv"
          "$sdist_venv/bin/python" -m pip install --no-deps "$sdist_path"

          cd "$smoke_dir"
          "$sdist_venv/bin/dayi" --version
          "$sdist_venv/bin/python" -c "import dayi; print(dayi.__version__)"
          "$sdist_venv/bin/dayi" doctor --json > "${RUNNER_TEMP}/sdist-doctor.json"
          "$sdist_venv/bin/dayi" plugins list --json > "${RUNNER_TEMP}/sdist-plugins.json"
          "$sdist_venv/bin/python" -m json.tool "${RUNNER_TEMP}/sdist-doctor.json" >/dev/null
          "$sdist_venv/bin/python" -m json.tool "${RUNNER_TEMP}/sdist-plugins.json" >/dev/null
          "$sdist_venv/bin/python" - <<'PY'
          import os
          from pathlib import Path

          import dayi

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          package_path = Path(dayi.__file__).resolve()
          if package_path == workspace or workspace in package_path.parents:
              raise SystemExit(f"dayi imported from checkout: {package_path}")
          print(package_path)
          PY

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: dayi-stego-solver-${{ github.sha }}
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 10
